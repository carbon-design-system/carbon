# Purpose: Configure the github/issue-labeler action used by issue-triage.yml.
# It adds repository labels when issue titles or bodies match these rules.
# The workflow enables title matching, so every expression below is evaluated
# against both the issue title and body.
#
# Keys within this file are the name of the label in the repository that we want
# to add (eg: "package: styles", "browser: chrome") and the value is the regular
# expression for when to apply the label. Should the regular expression not
# match, the label will not be applied.
#
# This only adds labels. Labels are not removed if the regex doesn't match. This
# is because we do not configure `sync-labels: 1` in the workflow file.
#
# When changes are made to this file, consider updating the `not-before` config
# in the workflow file to match the day you open the PR of your changes. This
# will ensure that only new issues moving forward are labelled with the contents
# of this file.
#
# @see https://github.com/marketplace/actions/regex-issue-labeler

# Values wrapped in /.../ are regular expressions. The optional trailing `i`
# makes a rule case-insensitive. Prefer precise component identifiers here:
# generic words such as "form" and "link" would create many false positives.

# a11y labels, case insensitive
'a11y: high contrast mode':
  - '/(high contrast)/i'
'a11y: JAWS':
  - '/(jaws)/i'
'a11y: NVDA':
  - '/(nvda)/i'
'a11y: TalkBack':
  - '/(talkback)/i'
'a11y: VoiceOver':
  - '/(voiceover)/i'

# Adopter labels
# Add 'adopter: strategic-product' label if issue contains any of these
# project names. Case insensitive.
'adopter: strategic-product':
  - '/(API Connect|Turbonomic|Instana|NS1|watsonx Orchestrate|watsonx Code
    Assistant|Planning Analytics|SPSS
    Statistics|watsonx\.data|watsonx\.ai|watsonx\.governance|Maximo Application
    Suite|Environmental Intelligence Suite|Envizi ESG Suite|QRadar Log
    Insights|QRadar XDR/EDR \(ReaQta\)|Randori ASM|QRadar
    SIEM|MaaS360|Flash|Defender|Fusion|APP Connect|Apptio Cloudability|Apptio
    Targetprocess|AIOps Insights|Hybrid Cloud Mesh|Aspera|Blueworks
    Live|OpenPages|Databand\.ai|Cognos Analytics|Sterling B2B Integration
    SaaS|Sterling Order & Inventory Management|Supply Chain Intelligence
    Suite|TRIRIGA Application Suite|QRadar SOAR|Guardium Insights|Verify on
    Cloud|DataPower)/i'

# Browser labels, case insensitive
'browser: chrome':
  - '/(chrome)/i'
'browser: firefox':
  - '/(firefox)/i'
'browser: safari':
  - '/(safari)/i'

# Component labels. Match canonical React component names and the custom element
# tag spelling used by @carbon/web-components. Keeping these patterns specific
# avoids treating ordinary words such as "form" or "link" as component names.
'component: accordion':
  - '/\bAccordion(Item|Skeleton)?\b/'
  - '/\bcds-accordion(?!-)/i'
'component: ai-label':
  - '/\bAILabel\b/'
  - '/\bcds-ai-label(?!-)/i'
'component: ai-skeleton':
  - '/\bAISkeleton\b/'
  - '/\bcds-ai-skeleton-(icon|placeholder|text)(?!-)/i'
'component: breadcrumb':
