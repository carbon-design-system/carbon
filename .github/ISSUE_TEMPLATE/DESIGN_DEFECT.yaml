# Purpose: Collect visual design defects as formal Bugs. The shared Bug
# metadata plugin handles severity and Project 39 defaults for this form too.
name: Design defect 🎨
description: Report a visual design issue for an existing component or pattern.
title: '[Bug]: '
type: 'bug'
labels: ['type: bug 🐛']
body:
  - type: markdown
    attributes:
      value: '## Welcome!'
  - type: markdown
    attributes:
      value:
        Thanks for taking the time to fill out the details below for this design
        defect.
  - type: dropdown
    id: package
    attributes:
      label: Package
      description: Which package(s) are you using?
      multiple: true
      options:
        - '@carbon/react'
        - '@carbon/styles'
        - 'carbon-components'
        - 'carbon-components-react'
        - '@carbon/colors'
        - '@carbon/elements'
        - '@carbon/grid'
        - '@carbon/icons'
        - '@carbon/icons-react'
        - '@carbon/icons-vue'
        - '@carbon/layout'
        - '@carbon/motion'
        - '@carbon/pictograms'
        - '@carbon/pictograms-react'
        - '@carbon/themes'
        - '@carbon/type'
        - '@carbon/upgrade'
        - '@carbon/web-components'
    validations:
      required: true
  - type: dropdown
    id: browser
    attributes:
      label: Browser
      description: Which browser(s) are you experiencing the issue?
      multiple: true
      options:
        - Chrome
        - Safari
        - Firefox
        - Edge
  - type: input
    id: version
    attributes:
      label: Package version
      description: 'Which version(s) are you using?'
      placeholder: e.g. v10.42.0
    validations:
      required: true
  - type: textarea
    id: description
    attributes:
      label: Description
      description: "Tell us more about the problem that you're running into"
      placeholder: What did you see? What did you expect to see?
    validations:
      required: true
  - type: textarea
    id: example-url
    attributes:
      label: Screenshots
      description: 'Provide screenshots of the problem'
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description:
        'How do we reproduce the problem displayed in the screenshots above?'
    validations:
      required: true
  - type: dropdown
    id: severity
    # The automation reads the "Suggested Severity" heading and the numeric
    # value in each option. Keep both stable if the surrounding copy changes.
    attributes:
      label: Suggested Severity
      description:
        'Read more to understand our [severity
        levels](https://github.com/carbon-design-system/carbon/blob/main/docs/guides/support.md#severity)'
      options:
        - 'Critical (Severity 1) = Must be fixed ASAP. The response must be
          swift. Someone from the team must drop all current work and be
          immediately reassigned to address the issue.'
        - 'High (Severity 2) = User cannot complete task, and/or no workaround
          within the user experience of a given component.'
        - 'Medium (Severity 3) = User can complete task, and/or has a workaround
          within the user experience of a given component.'
        - 'Low (Severity 4) = Unrelated to a user task, has a workaround or does
          not need a workaround.'
    validations:
      # Every new Bug needs a reporter-provided suggestion; maintainers can
      # still change the resulting issue field during triage.
      required: true
  - type: checkboxes
    id: terms
    attributes:
      label: Code of Conduct
      description: Please confirm the following
      options:
        - label:
            I agree to follow this project's [Code of
            Conduct](https://github.com/carbon-design-system/carbon/blob/f555616971a03fd454c0f4daea184adf41fff05b/.github/CODE_OF_CONDUCT.md)
          required: true
        - label:
            I checked the [current
            issues](https://github.com/carbon-design-system/carbon/issues) for
            duplicate problems
  - type: markdown
    attributes:
      value: |
        > [!TIP]
        >
        > You do not need to apply labels. Labels are applied automatically and by the Carbon team when your issue is triaged.
