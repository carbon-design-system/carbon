name: Validate PR template
description: Validate that a pull request body follows the repository PR template
runs:
  using: composite
  steps:
    - name: Collect PR template validation data
      id: collect
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        ACTION_PATH: ${{ github.action_path }}
      with:
        script: |
          const { collectValidationData } = require(`${process.env.ACTION_PATH}/index.js`);
          return await collectValidationData({ github, context, core });

    - name: Validate required headings
      if: ${{ always() }}
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        ACTION_PATH: ${{ github.action_path }}
        VALIDATION_DATA: ${{ steps.collect.outputs.result }}
      with:
        script: |
          const { validateHeadings } = require(`${process.env.ACTION_PATH}/index.js`);
          await validateHeadings({ core });

    - name: Validate checklist items
      if: ${{ always() }}
      uses: actions/github-script@ed597411d8f924073f98dfc5c65a23a2325f34cd # v8.0.0
      env:
        ACTION_PATH: ${{ github.action_path }}
        VALIDATION_DATA: ${{ steps.collect.outputs.result }}
      with:
        script: |
          const { validateChecklistItems } = require(`${process.env.ACTION_PATH}/index.js`);
          await validateChecklistItems({ core });
